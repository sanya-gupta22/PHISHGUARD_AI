<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History - PhishGuard AI</title>
    <link rel="stylesheet" href="history.css" />
</head>
<body>
    <!-- Menu Toggle Button (visible on mobile) -->
    <button class="menu-toggle" id="menuToggle">&#9776;</button>

    <!-- Sidebar Navigation -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>PhishGuard AI</h2>
            <p>Email Security Protection</p>
        </div>
        <div class="sidebar-menu">
            <a href="dashboard.html" class="menu-item">
                <span class="menu-icon"></span> Dashboard
            </a>
            <a href="history.html" class="menu-item active">
                <span class="menu-icon"></span> History
            </a>
            <a href="settings.html" class="menu-item">
                <span class="menu-icon"></span> Settings
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="footer-text">PhishGuard AI v2.0</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <!-- Top Section -->
            <div class="top-section">
                <h1>Email Scan History</h1>
                <p>Complete history of all scanned emails with detailed analysis</p>
                
                <!-- Stats Bar (same as original) -->
                <div class="stats-bar">
                    <div class="stat-card">
                        <div>Total Scans</div>
                        <div class="stat-number" id="totalScans">0</div>
                    </div>
                    <div class="stat-card">
                        <div>Phishing</div>
                        <div class="stat-number" id="phishingCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div>Safe</div>
                        <div class="stat-number" id="safeCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div>High Risk</div>
                        <div class="stat-number" id="highRiskCount">0</div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="export-btn" id="exportBtn"> Export to CSV</button>
                <button class="clear-btn" id="clearHistoryBtn"> Clear All History</button>
            </div>

            <!-- Filter Buttons -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="Phishing"> Phishing</button>
                <button class="filter-btn" data-filter="Safe"> Safe</button>
                <button class="filter-btn" data-filter="High"> High Risk</button>
                <button class="filter-btn" data-filter="Medium"> Medium Risk</button>
            </div>

            <!-- Table -->
            <div class="table-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Email Preview</th>
                            <th>Prediction</th>
                            <th>Confidence</th>
                            <th>Risk Level</th>
                            <th>Scan Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        <!-- Dynamic rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="history.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - PhishGuard AI</title>
    <link rel="stylesheet" href="popup.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            margin-top: 10px;
        }
        .chart-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .keyword-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .keyword-item {
            padding: 8px;
            margin: 5px 0;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 768px) {
            .chart-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <h1> PhishGuard Dashboard</h1>
        <p>Comprehensive Email Security Analytics</p>
    </div>

    <!-- Stats Cards -->
    <div class="dashboard-stats">
        <div class="stat-card">
            <div> Total Scanned</div>
            <div class="stat-number" id="totalScanned">0</div>
        </div>
        <div class="stat-card">
            <div> Safe Emails</div>
            <div class="stat-number" id="safeEmails">0</div>
        </div>
        <div class="stat-card">
            <div> Phishing Emails</div>
            <div class="stat-number" id="phishingEmails">0</div>
        </div>
        <div class="stat-card">
            <div> Accuracy Rate</div>
            <div class="stat-number" id="accuracyRate">0%</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="chart-container">
        <div class="card">
            <h3>Detection Results</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div class="card">
            <h3>Risk Levels Distribution</h3>
            <canvas id="riskChart"></canvas>
        </div>
        <div class="card full-width">
            <h3>Detection Trends (Last 7 Days)</h3>
            <canvas id="trendChart"></canvas>
        </div>
    </div>

    <!-- Additional Analytics -->
    <div class="chart-container">
        <div class="card">
            <h3> Most Common Phishing Keywords</h3>
            <div id="keywordList" class="keyword-list">
                <p style="color: #999;">Loading keywords...</p>
            </div>
        </div>
        <div class="card">
            <h3> Top Sender Domains</h3>
            <div id="domainList" class="keyword-list">
                <p style="color: #999;">Loading domains...</p>
            </div>
        </div>
    </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
